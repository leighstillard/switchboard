# Switchboard Example Configuration
# Copy to ~/.config/switchboard/config.toml and edit values.
# Secrets can reference environment variables with ${VAR} syntax.

[bridge]
name = "switchboard"
data_dir = "~/.local/share/switchboard"  # SQLite, audit logs

[bridge.routing]
# If true, channels without an explicit [[channels]] entry will use
# ~/workspace/<channel-name> as the workdir if it exists.
# Default off; opt in if you understand the rename/typo failure mode.
workspace_fallback = false

[bridge.audit]
retention_days = 30
verbose = false

[bridge.files]
max_inbound_mb = 25
max_outbound_mb = 50

[slack]
app_token = "${SLACK_APP_TOKEN}"      # xapp-... (Socket Mode)
bot_token = "${SLACK_BOT_TOKEN}"      # xoxb-...
signing_secret = "${SLACK_SIGNING_SECRET}"

[routing.backend]
# Default agent backend for channels that don't set their own.
default = "jcode"  # "jcode" or "claude"; empty defaults to "jcode"

[routing.llm]
# LLM notification router: when an inbound webhook matches no [[routes]] rule,
# a Claude model picks the destination thread. Fails safe to fallback_channel_id.
enabled = false
model = "claude-haiku-4-5"
confidence_threshold = 80        # below this, fall back instead of routing
max_input_tokens = 4000
include_thread_count = 30        # recent threads offered as candidates
api_key = "${ANTHROPIC_API_KEY}"
monthly_budget_usd = 5.0         # hard cap; router disables itself when exceeded

[jcode]
socket_path = ""  # empty = use $XDG_RUNTIME_DIR/jcode.sock (default)
auto_spawn = true
spawn_command = "jcode serve --quiet --no-update"

[claude]
# Claude Code CLI backend. Runs one long-running `claude` process per session.
# Inherits the ambient environment, including subscription OAuth / keychain creds.
binary = "claude"                       # CLI on PATH
model = "claude-sonnet-4-20250514"      # default model
permission_policy = "accept_edits_only" # allow_all | deny_all | accept_edits_only
setting_sources = "project,local"       # excludes user-layer hooks by default
append_system_prompt = ""               # appended to the system prompt
graceful_stop_timeout = "30s"
idle_eviction_timeout = "30m"           # "0" = never evict
min_version = "2.1.0"                    # startup version floor
# max_version = ""                       # optional ceiling
# extra_env = { FOO = "bar" }            # applied last, overrides inherited env
# extra_args = []                        # additional CLI arguments

# Bot identities (used via chat:write.customize scope)
[identities.pm]
display_name = "PM"
icon_url = "https://example.com/pm.png"

[identities.notifier]
display_name = "Switchboard"
icon_url = "https://example.com/switchboard.png"

# Channels are keyed by Slack channel_id (immutable).
# Get IDs via `slack conversations.list` or the Slack URL bar.
# `name` is display-only and refreshed from Slack on startup.

[[channels]]
id = "C0123ABCDEF"
name = "impex-scraper"
workdir = "~/workspace/impex-scraper"
identity = "Partseeker Worker"
icon_url = "https://example.com/partseeker.png"

[[channels]]
id = "C0456GHIJKL"
name = "slopwatch"
workdir = "~/workspace/slopwatch"
identity = "Slopwatch Worker"
icon_url = "https://example.com/slopwatch.png"
backend = "claude"                   # optional; inherit routing.backend.default if unset
model = "claude-sonnet-4-20250514"   # optional per-channel model override

[ingest]
listen_addr = "127.0.0.1:8765"  # behind Cloudflare Tunnel
fallback_channel_id = "C0789MNOPQR"  # #notifications, by ID
durable_inbox = true
max_body_kb = 1024
max_attempts = 5

[ingest.sources.github]
secret = "${GITHUB_WEBHOOK_SECRET}"
signature_header = "X-Hub-Signature-256"

[ingest.sources.temporal]
secret = "${TEMPORAL_WEBHOOK_SECRET}"
signature_header = "X-Switchboard-Signature"

[ingest.sources.cron]
secret = "${CRON_WEBHOOK_SECRET}"
signature_header = "X-Switchboard-Signature"

# The "api" source gates POST /api/correlate, which lets agents register
# external-id -> Slack-thread mappings (e.g. a Temporal workflow_id) so routed
# webhooks land in the originating thread. This endpoint FAILS CLOSED: if no
# non-empty secret is configured here, /api/correlate is disabled and returns
# 401 for every request. Set a secret to enable it.
[ingest.sources.api]
secret = "${API_CORRELATE_SECRET}"
signature_header = "X-Switchboard-Signature"

# Cron jobs: scheduled prompt dispatches.
# Each job fires on schedule, posts the prompt to the target channel,
# and streams the agent response into a new Slack thread.

# [[cron]]
# id = "daily-drift-audit"
# schedule = "0 21 * * *"              # standard 5-field cron (minute hour dom month dow)
# channel_id = "C0123ABCDEF"
# prompt = "Run the nightly audit..."
# user_id = "U0123USER"                # optional: @mention on completion
# enabled = true

# Routing rules (v1: deterministic matching only)
# Destination uses channel_id, not name.

[[routes]]
source = "github"
template = "github_pr"
[routes.match]
event_type = "pull_request"
repo = "format5/partseeker"
[routes.destination]
channel_id = "C0123ABCDEF"
[routes.correlation]
field = "pull_request.html_url"
ttl_days = 7

[[routes]]
source = "temporal"
template = "workflow_status"
[routes.match]
workflow_id_prefix = "slopwatch-eval-"
[routes.destination]
channel_id = "C0456GHIJKL"
[routes.correlation]
field = "workflow_id"
ttl_days = 1
